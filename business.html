<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Partners</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img/logoicon.jpg">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a; 
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-section {
            text-align: center;
            padding: 50px 20px;
            width: 100%;
            background: linear-gradient(180deg, rgba(16, 185, 129, 0.1) 0%, rgba(15, 23, 42, 0) 100%);
        }

        h1 {
            font-size: 2.2rem;
            margin: 0;
            transition: color 0.3s;
        }

        .subtitle {
            color: #8CC63F;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 10px;
            display: block;
        }

        .directory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 15px; 
            width: 95%;
            max-width: 1200px; 
            padding: 20px 0 80px;
        }

        .partner-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .partner-card:hover {
            border-color: #8CC63F;
            transform: translateY(-5px);
        }

        .partner-name {
            font-size: 1.2rem;
            margin: 0 0 8px 0;
            color: #ffffff;
        }

        .role-keyword {
            display: inline-block;
            background: rgba(16, 185, 129, 0.1);
            color: #8CC63F;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.6rem;
            padding: 4px 10px;
            border-radius: 4px;
            margin-bottom: 12px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .company-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .company-list li {
            font-size: 0.85rem;
            color: #94a3b8;
            padding: 4px 0;
            display: flex;
            align-items: center;
        }

        .company-list li::before {
            content: "•";
            color: #8CC63F;
            margin-right: 10px;
            font-weight: bold;
        }

        .action-buttons {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1000;
        }

        .side-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            color: #f1f5f9;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .side-btn:hover {
            border-color: #8CC63F;
            color: #8CC63F;
            transform: scale(1.05);
        }

        .mode-inactive .side-btn#toggleViewBtn {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
        }
        
        .mode-inactive .role-keyword {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .mode-inactive .company-list li::before {
            color: #ef4444;
        }
    </style>
</head>
<body id="pageBody">

    <div class="action-buttons">
        <a href="index.html" class="side-btn" title="Back to Search">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        </a>
        
        <button id="toggleViewBtn" class="side-btn" title="Switch View" onclick="toggleMode()">
            <span id="btnIcon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="8.5" cy="7" r="4"></circle>
                    <polyline points="17 11 19 13 23 9"></polyline>
                </svg>
            </span>
        </button>
    </div>

    <div class="header-section">
        <span class="subtitle" id="subtitleText">Eastvantage Operations</span>
        <h1 id="directoryTitle">Business Partners Directory</h1>
    </div>

    <div class="directory-grid" id="partnerGrid"></div>

    <script src="script.js"></script>

    <script>
        let isInactiveMode = false;
        const partnersList = [
            "Nelien Tila-on", "Mohanraj MJ", "Jonas Soria", 
            "Ana Martela Dujunco", "Glenda Felio", "Vishnu Prakash Padmanabhan",
            "Kumareshan D", "Adrian Jay Gomez", "Hajar EL ALAOUI",
            "Abdelhak Bouroubaya", "Anirudha Bhimrao Mahajan", 
            "Sandy Guevarra", "Yves Vanderlinden", "Jade Dela Cruz",
            "Ralph Kenneth Paras", "Martha May Canales", "Julia Cansino",
            "Ifrah Ait-Oukir", "Gwen Paolo Guerrero"
        ];

        if (typeof allClients !== 'undefined') {
            const newClients = [
                { "name": "Baytech BPO Corporation", "status": "Inactive", "businessPartner": "Ralph Kenneth Paras" },
                { "name": "Intellitek", "status": "Inactive", "businessPartner": "Ralph Kenneth Paras" },
                { "name": "One Simple Key", "status": "Inactive", "businessPartner": "Martha May Canales" },
                { "name": "SIM - Managed Services", "status": "Inactive", "businessPartner": "Julia Cansino" },
                { "name": "Simcorp", "status": "Inactive", "businessPartner": "Julia Cansino" },
                { "name": "GRS Solutions", "status": "Inactive", "businessPartner": "Ifrah Ait-Oukir" },
                { "name": "PAQ IT", "status": "Inactive", "businessPartner": "Gwen Paolo Guerrero" }
            ];

            newClients.forEach(newClient => {
                const exists = allClients.some(c => c.name === newClient.name);
                if (!exists) {
                    allClients.push(newClient);
                }
            });
        }

        const activeIcon = `
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="8.5" cy="7" r="4"></circle>
                <polyline points="17 11 19 13 23 9"></polyline>
            </svg>`;
        
        const inactiveIcon = `
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <line x1="18" y1="8" x2="22" y2="12"></line>
                <line x1="22" y1="8" x2="18" y2="12"></line>
            </svg>`;

        function renderDirectory() {
            const grid = document.getElementById('partnerGrid');
            const title = document.getElementById('directoryTitle');
            const body = document.getElementById('pageBody');
            const iconSpan = document.getElementById('btnIcon');

            grid.innerHTML = '';

            if (isInactiveMode) {
                body.classList.add('mode-inactive');
                title.innerText = "Inactive Accounts Directory";
                title.style.color = "#ef4444";
                iconSpan.innerHTML = inactiveIcon;
            } else {
                body.classList.remove('mode-inactive');
                title.innerText = "Active Accounts Directory";
                title.style.color = "#ffffff";
                iconSpan.innerHTML = activeIcon;
            }

            partnersList.forEach(partnerName => {
                const filteredClients = allClients.filter(client => 
                    client.businessPartner === partnerName && 
                    (isInactiveMode ? client.status === "Inactive" : client.status === "Active")
                );

                if (filteredClients.length > 0) {
                    const card = document.createElement('div');
                    card.className = 'partner-card';
                    
                    const clientListHtml = filteredClients.map(c => `<li>${c.name}</li>`).join('');

                    card.innerHTML = `
                        <h2 class="partner-name">${partnerName}</h2>
                        <div class="role-keyword">Business Partner</div>
                        <ul class="company-list">
                            ${clientListHtml}
                        </ul>
                    `;
                    grid.appendChild(card);
                }
            });
        }

        function toggleMode() {
            isInactiveMode = !isInactiveMode;
            renderDirectory();
        }

        document.addEventListener('DOMContentLoaded', renderDirectory);
    </script>
</body>
</html>
