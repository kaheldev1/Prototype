<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> System Prototype</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img\logoicon.jpg">
</head>
<body>
    <div class="top-banner">
        <img src="img\Outlook-A blue bac.png" alt="Banner">
    </div>
     
    <div id="errorModal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2>Oops!</h2>
        <p>We couldn't find what you're looking for.</p>
        <p class="suggestion">Try searching <strong>'Profile'</strong> or <strong>'Clients'</strong>.</p>
    </div>
    </div>
    <div class="container">
        <header>
            <h1>Search Eastvantage Data</h1>
            <p>Search for Profile and clients.</p>
        </header>

        <div class="search-section">
            <div class="search-input-wrapper">
                <input type="text" id="searchInput" placeholder="Search here..." autofocus>
                <button id="searchBtn">Search</button>
            </div>
            <p id="errorMessage" class="error-text"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
