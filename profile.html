<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile View</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a; 
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        .top-banner {
            width: 100%;
            margin: 0;
            padding: 0;
            line-height: 0;
            border-bottom: 3px solid #10b981;
        }

        .top-banner img {
            width: 100%;
            height: auto;
            display: block;
            max-height: 100px; 
            object-fit: contain; 
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 60px 20px; 
        }

        .profile-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #334155;
            padding-bottom: 20px;
        }

        .badge {
            background: #064e3b;
            color: #34d399;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .info-block { margin-top: 30px; }
        .info-block h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 10px;
        }

        .info-item label {
            display: block;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .info-item p {
            font-size: 1rem;
            color: #f1f5f9;
        }

        .footer-actions {
            margin-top: 40px;
            text-align: center;
            border-top: 1px solid #334155;
            padding-top: 20px;
        }

        .btn-secondary {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #334155;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-secondary:hover {
            background: #334155;
            color: white;
        }
        .floating-home-btn {
            position: fixed; 
            top: 20px;       
            left: 20px;      
            z-index: 9999;   
            background: #1e293b; 
            color: #10b981;  
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .floating-home-btn:hover {
            background: #10b981;
            color: white;
            transform: scale(1.1); 
        }
    </style>
</head>
<body>
     <a href="index.html" class="floating-home-btn" title="Return to Search">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
    </a>
    <div class="container">
        <div class="profile-card">
            <div class="profile-header">
                <h1 id="userName">Nelien Tila-on</h1>
                <span class="badge">Operations Manager</span>
            </div>

            <div class="info-block">
                <h3>Team Member Information</h3>
                <div class="info-grid">
                    <div class="info-item">
                        <label>Name</label>
                        <p></p>
                    </div>
                    <div class="info-item">
                        <label>Email</label>
                        <p>nelien@example.com</p>
                    </div>
                </div>
            </div>

            <div class="info-block">
                <h3>About</h3>
                <p id="userAbout"></p>
            </div>

            <div class="info-block">
                <h3>Client</h3>
                <div id="accountsContainer">
                    <div class="info-grid">
                        <div class="info-item">
                            <label>Primary Account</label>
                            <p>Abacus Service Corporation</p>
                        </div>
                        <div class="info-item">
                            <label>Status</label>
                            <p style="color: #10b981; font-weight: bold;">Active</p>
                        </div>
                    </div>
                </div>
            </div>

            
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
